"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Miha Filej"
email = "miha@filej.net"

[aliases]
difft = [
  "--config",
  "ui.diff-formatter='difft --color=always $left $right'",
  "diff",
]

[colors]
"diff token" = { underline = false }

[ui]
editor = "nvim"
pager = "delta"
default-command = "log"
merge-editor = ":builtin"
diff-editor = ":builtin"
diff-formatter = ":git"

[revset-aliases]
"immutable_heads()" = "builtin_immutable_heads() | (trunk().. & ~mine())"
'why_immutable(r)' = 'r | roots(r:: & immutable_heads())'
"private()" = "description(substring:'[private]')"
"pushable()" = "~private()"

[git]
write-change-id-header = true

[templates]
git_push_bookmark = '"mfi-" ++ change_id.short()'
draft_commit_description = "builtin_draft_commit_description_with_diff"

[merge-tools.zed]
program = "zed"
diff-args = ["--diff", "$left", "$right"]
