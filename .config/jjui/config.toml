[ui.tracer]
enabled = true

[revisions]
revset = "(present(@) | ancestors(immutable_heads().., 2) | trunk()) ~ shelved()"

[preview]
revision_command = ["show", "--color", "always", "--tool", "delta-preview", "-r", "$change_id"]
file_command = ["diff", "--color", "always", "--tool", "delta-file-preview", "-r", "$change_id", "$file"]

[[actions]]
name = "diff-with"
lua = '''
local change = context.change_id()
if not change or change == "" then
  flash({ text = "No change selected", error = true })
  return
end

local file = context.file()
local tool = choose({
  title = "Diff with",
  options = {
    "default",
    "difft",
    "delta",
    ":git",
    ":color-words",
    ":summary",
    ":stat",
    ":types",
    ":name-only",
  },
  ordered = true,
})
if not tool then
  return
end

local args
if file and file ~= "" then
  args = { "diff", "-r", change }
else
  args = { "show", "-r", change }
end

if tool ~= "default" then
  table.insert(args, "--tool")
  table.insert(args, tool)
end

if file and file ~= "" then
  table.insert(args, file)
end

local out, err = jj(args)
if err then
  flash({ text = err, error = true })
  return
end

jjui.diff.show(out)
'''

