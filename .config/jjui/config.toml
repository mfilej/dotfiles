[[actions]]
name = "diff-with-revdiff"
lua = '''
local change = context.change_id()
if not change or change == "" then
  flash({ text = "No change selected", error = true })
  return
end

local function shell_quote(s)
  return "'" .. tostring(s):gsub("'", [['"'"']]) .. "'"
end

local cmd = "revdiff"
local file = context.file()
if file and file ~= "" then
  cmd = cmd .. " --only " .. shell_quote(file)
end
cmd = cmd .. " " .. shell_quote(change .. "-") .. " " .. shell_quote(change)

exec_shell(cmd)
'''

[[actions]]
name = "move-commit-down"
lua = '''
jj_async("rebase", "-r", context.change_id(), "--insert-before", context.change_id() .. "-")
jjui.builtin.revisions.refresh()
'''

[[actions]]
name = "move-commit-up"
lua = '''
jj_async("rebase", "-r", context.change_id(), "--insert-after", context.change_id() .. "+")
jjui.builtin.revisions.refresh()
'''

[[actions]]
name = "parent-add"
lua = '''
jj_async("rebase", "-s", "@", "-d", "parents(@) | " .. context.change_id())
jjui.builtin.revisions.refresh()
'''

[[actions]]
name = "parent-remove"
lua = '''
jj_async("rebase", "-s", "@", "-d", "parents(@) ~ " .. context.change_id())
jjui.builtin.revisions.refresh()
'''

[[actions]]
name = "rebase-all-mine-onto-trunk"
lua = '''
jj_async("rebase", "-b", "visible_heads() & mine()", "-d", "trunk()")
jjui.builtin.revisions.refresh()
'''

[[actions]]
name = "create-pull-request"
lua = '''
local bookmarks, err = jj("log", "--no-graph", "-r", context.change_id(), "-T", "bookmarks")
if err ~= nil then
  flash({ text = err, error = true, sticky = true })
  return
end

local lines = split_lines(bookmarks)
local first = lines[1]
local head = first and first:match("([^%s]+)") or nil
if head == nil or head == "" then
  flash({ text = "No bookmark found for selected change", error = true, sticky = true })
  return
end

exec_shell("gh pr create --fill-verbose --head " .. head)
'''

[[bindings]]
action = "diff-with-revdiff"
key = "d"
scope = "revisions"
desc = "Diff with revdiff"

[[bindings]]
action = "diff-with-delta"
seq = ["X", "d"]
scope = "revisions"
desc = "Diff with delta"

[[bindings]]
action = "move-commit-down"
key = "J"
scope = "revisions"
desc = "Move commit down"

[[bindings]]
action = "move-commit-up"
key = "K"
scope = "revisions"
desc = "Move commit up"

[[bindings]]
action = "parent-add"
key = "m"
scope = "revisions"
desc = "Parent add"

[[bindings]]
action = "parent-remove"
key = "M"
scope = "revisions"
desc = "Parent remove"

[[bindings]]
action = "rebase-all-mine-onto-trunk"
key = "F"
scope = "revisions"
desc = "Rebase all mine onto trunk"

[[bindings]]
action = "create-pull-request"
seq = ["X", "p"]
scope = "revisions"
desc = "Create pull request"

[[bindings]]
action = "revisions.rebase.set_target"
key = "A"
scope = "revisions.rebase"
desc = "target: after"
args.target = "after"

[[bindings]]
action = "revisions.rebase.set_source"
key = "b"
scope = "revisions.rebase"
desc = "source: branch"
args.source = "branch"

[[bindings]]
action = "revisions.rebase.set_target"
key = "B"
scope = "revisions.rebase"
desc = "target: before"
args.target = "before"
