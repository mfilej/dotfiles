[settings]
idiomatic_version_file_enable_tools = ["ruby"]
experimental = true
python.uv_venv_auto = true
age.key_file = "~/.ssh/age.txt"

[settings.github]
use_git_credentials = true

[tasks.bootstrap]
run = '''
#!/opt/homebrew/bin/fish
set -U fish_greeting
fish_add_path /opt/zerobrew/bin /opt/homebrew/bin/ /opt/homebrew/sbin/ ~/bin/ || true
'''

[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

[bootstrap.macos.keyboard]
key_repeat = 2
initial_key_repeat = 15

[bootstrap.macos.trackpad]
tap_to_click = true

[bootstrap.macos.dock]
autohide = true
tilesize = 64
magnification = true
largesize = 86
show_recents = false

[bootstrap.macos.defaults.NSGlobalDomain]
NSAutomaticSpellingCorrectionEnabled = false
NSAutomaticCapitalizationEnabled = false
NSAutomaticPeriodSubstitutionEnabled = false
"com.apple.sound.beep.volume" = 0.0
"com.apple.sound.uiaudio.enabled" = 0

# uncheck "switch to a Space with open windows..."
AppleSpacesSwitchOnActivate = false

# uncheck "Close windows when quitting an application"
NSQuitAlwaysKeepsWindows = true

[bootstrap.macos.defaults."com.apple.dock"]
# check "Group windows by application"
"expose-group-apps" = true       

[bootstrap.macos.defaults."com.apple.universalaccess"]
# Accessibility > Display: Show window title icons
showWindowTitlebarIcons = true

[bootstrap.macos.finder]
# Change to column view
preferred_view_style = "column"

# Uncheck "Show warning before changing an extension"
show_extensions_warning = false

[bootstrap.macos.defaults."com.apple.finder"]
# New Finder windows show home directory
NewWindowTarget = "PfHm"

# Uncheck "Open folders in tabs instead of new windows"
FinderSpawnTab = false

# Uncheck "Show warning before removing from iCloud Drive"
FXEnableRemoveFromICloudDriveWarning = false

# Remove items from Trash after 30 days
FXRemoveOldTrashItems = true

[bootstrap.macos.defaults."com.apple.Safari"]
# Advanced: Show full website address
ShowFullURLInSmartSearchField = true

# Advanced: Show features for web developers
IncludeDevelopMenu = true
WebKitDeveloperExtrasEnabledPreferenceKey = true
"WebKitPreferences.developerExtrasEnabled" = true

[bootstrap.macos.defaults."com.apple.Safari.SandboxBroker"]
# Also part of Develop menu visibility
ShowDevelopMenu = true

[bootstrap.macos.defaults."com.apple.mail"]
# Viewing: List Preview: None
NumberOfSnippetLines = 0

# Composing: Message Format: Plain Text
SendFormat = "Plain"

[bootstrap.hooks.post-packages]
run = "echo some cask packages are still missing"

