[hotkeys]
custom = []

    [hotkeys.app.activate]
    carbonKeyCode = 49
    carbonModifiers = 4096

    [hotkeys.app.comboMode]
    carbonKeyCode = 47
    carbonModifiers = 256

    [hotkeys.app.dictation]
    carbonKeyCode = 39
    carbonModifiers = 256

[settings]
activationDoublePressTrigger = 'leftOption'
appPresentationMode = 'dock'
comboModeCheatsheetBehavior = 'never'
comboModeModifierTrigger = 'leftOption'
dictationActivationMode = 'toggle'
holdToExecuteEnabled = true
resultListNavigationBindings = 'vimStyle'
spacebarBehavior = 'switchToTextMode'
textModeTriggerType = 'disabled'
themeIdentifier = 'com.brnbw.tuna.themes.default'
typingTimeoutDuration = 0.5

[[smartLinks.entries]]
enabled = true
name = 'GitHub'
requiresInput = true
template = 'https://github.com/search?q={{input}}'

[[smartLinks.entries]]
enabled = true
name = 'Google'
requiresInput = true
template = 'https://www.google.com/search?q={{input}}'

[[smartLinks.entries]]
enabled = true
name = 'Kagi'
requiresInput = true
template = 'https://kagi.com/search?q={{input}}'

[[smartLinks.entries]]
enabled = true
name = 'Wikipedia'
requiresInput = true
template = 'https://en.wikipedia.org/wiki/Special:Search?search={{input}}'

[[smartLinks.entries]]
enabled = true
name = 'YouTube'
requiresInput = true
template = 'https://www.youtube.com/results?search_query={{input}}'

[[catalogSettings]]
catalogIdentifier = 'com.brnbw.tuna.plugins.things'

    [catalogSettings.values]
    ShowThingsWhenAdding = 'false'